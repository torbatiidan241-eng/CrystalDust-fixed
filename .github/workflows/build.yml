name: Build GBA ROM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-arm-none-eabi binutils-arm-none-eabi libpng-dev pkg-config libz-dev

      - name: Build Tools
        run: |
          # Use standard system compilers for tools to ensure they run on Linux
          for dir in tools/*/; do
            if [ -f "${dir}Makefile" ]; then
              make -C "$dir" CC=gcc CXX=g++
            fi
          done

      - name: Build ROM
        run: |
          # Ensure current directory tools are in PATH
          export PATH=$PATH:$(pwd)/tools
          
          # Clean and build using ARM cross-compiler variables
          make clean
          make -j$(nproc) CC=arm-none-eabi-gcc \
                        CXX=arm-none-eabi-g++ \
                        LD=arm-none-eabi-ld \
                        AS=arm-none-eabi-as \
                        OBJCOPY=arm-none-eabi-objcopy \
                        AR=arm-none-eabi-ar

      - name: Upload ROM artifact
        uses: actions/upload-artifact@v4
        with:
          name: rom-artifact
          path: "*.gba"
