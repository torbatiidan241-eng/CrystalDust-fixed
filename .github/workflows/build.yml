name: Build GBA ROM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-arm-none-eabi binutils-arm-none-eabi libpng-dev pkg-config libz-dev

      - name: Build Tools
        run: |
          # Manually build the key tools found in standard GBA decompilation repos
          # If these folders exist, we compile them individually
          [ -d "tools/gbagfx" ] && make -C tools/gbagfx
          [ -d "tools/scaninc" ] && make -C tools/scaninc
          [ -d "tools/preproc" ] && make -C tools/preproc
          [ -d "tools/ramscrgen" ] && make -C tools/ramscrgen

      - name: Build ROM
        run: |
          # Add the tools directory to PATH
          export PATH=$PATH:$(pwd)/tools
          # Attempt the main build
          make -j$(nproc)

      - name: Upload ROM artifact
        uses: actions/upload-artifact@v4
        with:
          name: rom-artifact
          path: "*.gba"
