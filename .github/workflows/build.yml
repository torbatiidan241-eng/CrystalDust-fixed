name: Build GBA ROM

on:
  push:
    branches:
      - main
      - progrees
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-arm-none-eabi binutils-arm-none-eabi libpng-dev pkg-config libz-dev

      - name: Prepare Toolchain
        run: |
          # 1. Ensure agbcc is executable
          chmod +x tools/agbcc/agbcc
          
          # 2. Setup the directory structure the Makefile expects
          mkdir -p tools/agbcc/bin
          ln -sf "$(pwd)/tools/agbcc/agbcc" "$(pwd)/tools/agbcc/bin/agbcc"

      - name: Build ROM
        run: |
          # Add the tools directory to PATH
          export PATH="$(pwd)/tools:$PATH"
          
          # Clean and Build
          make clean
          make -j$(nproc) CC=arm-none-eabi-gcc \
                        CXX=arm-none-eabi-g++ \
                        AS=arm-none-eabi-as \
                        LD=arm-none-eabi-ld \
                        OBJCOPY=arm-none-eabi-objcopy \
                        CPPFLAGS="-Iinclude"
        
      - name: Upload ROM artifact
        uses: actions/upload-artifact@v4
        with:
          name: rom-artifact
          path: "*.gba"