name: Build GBA ROM

on:
  push:
    branches:
      - main
      - progrees
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-arm-none-eabi binutils-arm-none-eabi libpng-dev pkg-config libz-dev

      - name: Build agbcc
        run: |
          chmod -R +x tools/agbcc
          # Build only the compiler itself, skip the faulty libc build if it's failing
          cd tools/agbcc && ./build.sh && cd ../..
          # Note: If ./build.sh still tries to build libc and fails, 
          # you may need to edit ./build.sh to comment out the libc build line.

      - name: Prepare Toolchain
        run: |
          # Create the bin folder the Makefile expects
          mkdir -p tools/agbcc/bin
          # Link the newly built agbcc to the location the Makefile expects
          # We search for the executable anywhere in tools/agbcc
          FILE=$(find tools/agbcc -name "agbcc" -type f -perm /111 | head -n 1)
          ln -sf "$(pwd)/$FILE" "$(pwd)/tools/agbcc/bin/agbcc"

      - name: Build ROM
        run: |
          export PATH="$(pwd)/tools:$PATH"
          make clean
          make -j$(nproc) CC=arm-none-eabi-gcc \
                        CXX=arm-none-eabi-g++ \
                        AS=arm-none-eabi-as \
                        LD=arm-none-eabi-ld \
                        OBJCOPY=arm-none-eabi-objcopy \
                        CPPFLAGS="-Iinclude"
        
      - name: Upload ROM artifact
        uses: actions/upload-artifact@v4
        with:
          name: rom-artifact
          path: "*.gba"
