name: Build ROM

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build ROM
        run: |
          # 1. Ensure tools are in the PATH
          export PATH="$(pwd)/tools:$PATH"
          
          # 2. Use the specific agbcc binary from your tools folder
          # Replace 'tools/agbcc/agbcc' with the actual path to your agbcc binary
          AGBCC_PATH="$(pwd)/tools/agbcc/agbcc"
          
          make clean
          
          # 3. Invoke make using the local agbcc
          # We pass -w to suppress warnings, as agbcc treats warnings as fatal errors
          make -j$(nproc) CC="$AGBCC_PATH" \
                        CXX=arm-none-eabi-g++ \
                        AS=arm-none-eabi-as \
                        LD=arm-none-eabi-ld \
                        OBJCOPY=arm-none-eabi-objcopy \
                        CPPFLAGS="-Iinclude" \
                        CFLAGS="-w -ffreestanding"
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rom-files
          path: |
            *.gba
            *.map
            *.elf
