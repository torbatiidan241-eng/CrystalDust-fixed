name: Build ROM

on:
  push:
    branches:
      - progress
      - main
  pull_request:
    branches:
      - progress
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          # Install core tools required for building the ROM and internal helper tools
          sudo apt-get install -y build-essential libpng-dev gcc-arm-none-eabi binutils-arm-none-eabi

      - name: Build Tools
        run: |
          # 1. Debug: List the contents so we can see what we are dealing with
          ls -R tools/
          
          # 2. Try to build only if a Makefile exists, otherwise skip to prevent failure
          if [ -f "tools/Makefile" ]; then
            make -C tools
          else
            echo "No root Makefile in tools/, skipping tool build."
          fi
      - name: Build ROM
        run: |
          # Add the local tools directory to the PATH
          export PATH="$(pwd)/tools:$PATH"
          
          # Define the path to the legacy agbcc include headers
          # Adjust if your structure differs
          AGBCC_INCLUDE="$(pwd)/tools/agbcc/include"
          
          # Clean the build environment
          make clean
          
          # Build using the project's preferred compiler paths.
          # -w: Suppresses legacy compiler warnings (prevents #line errors)
          # CPPFLAGS: Points to your local headers, bypassing system headers
          make -j$(nproc) CPPFLAGS="-Iinclude -I$AGBCC_INCLUDE" \
                        CFLAGS="-w -ffreestanding"
          
      - name: Upload ROM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rom-files
          path: |
            *.gba
            *.map
            *.elf
