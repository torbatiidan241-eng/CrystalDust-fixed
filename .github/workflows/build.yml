name: Build ROM

on:
  push:
    branches:
      - progress
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpng-dev gcc-arm-none-eabi binutils-arm-none-eabi

      - name: Build Tools
        run: |
          # The tools directory needs to be compiled into executables
          # We use a loop to ensure each tool's Makefile is processed
          for tool in $(ls -d tools/*/); do
            if [ -f "${tool}Makefile" ]; then
              make -C "$tool"
            fi
          done

      - name: Build ROM
        run: |
          # Ensure local tools are in PATH
          export PATH="$(pwd)/tools:$PATH"
          
          # Clean build artifacts
          make clean
          
          # Build, ignoring warnings which agbcc incorrectly treats as errors
          # Also, ensure we don't use system headers by focusing on local include
          make -j$(nproc) CFLAGS="-w -ffreestanding"
