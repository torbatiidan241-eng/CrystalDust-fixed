name: Build GBA ROM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            libpng-dev \
            pkg-config \
            libz-dev

      - name: Build Tools
        run: |
          # The project root has a 'tools' folder. 
          # We run make in that directory to compile the binary tools.
          make -C tools

      - name: Build ROM
        run: |
          # We add the 'tools' directory to our PATH so the 
          # main Makefile can find the programs we just built.
          export PATH=$PATH:$(pwd)/tools
          make -j$(nproc)

      - name: Upload ROM artifact
        uses: actions/upload-artifact@v4
        with:
          name: rom-artifact
          path: "*.gba"
