name: Build ROM

on:
  push:
    branches:
      - progress
      - main
  pull_request:
    branches:
      - progress
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpng-dev gcc-arm-none-eabi binutils-arm-none-eabi

      - name: Build Tools
        run: |
          # Build tools individually if a root Makefile is missing
          for d in tools/*; do
            if [ -d "$d" ] && [ -f "${d}/Makefile" ]; then
              make -C "$d"
            fi
          done

      - name: Build ROM
        run: |
          # Ensure tools are in the PATH
          export PATH="$(pwd)/tools:$PATH"
          
          # Clean build artifacts
          make clean
          
          # Use -w to suppress warnings that agbcc treats as errors
          # Limit includes to the project's 'include' folder to avoid modern headers
          make -j$(nproc) CPPFLAGS="-Iinclude" CFLAGS="-w -ffreestanding"
          
      - name: Upload ROM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rom-files
          path: |
            *.gba
            *.map
            *.elf
