name: Build ROM

on:
  push:
    branches: [progress, main]
  pull_request:
    branches: [progress, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpng-dev gcc-arm-none-eabi binutils-arm-none-eabi

      - name: Build Tools
        run: |
          # Iterate through each directory in tools/
          for tool_dir in tools/*/; do
            if [ -d "$tool_dir" ]; then
              echo "Checking $tool_dir for Makefile..."
              # If a Makefile exists, build it
              if [ -f "${tool_dir}Makefile" ]; then
                make -C "$tool_dir"
              fi
            fi
          done

      - name: Build ROM
        run: |
          # Add all tool subdirectories to PATH
          # We use a loop to add every binary folder to ensure the main Makefile finds them
          for tool_dir in tools/*/; do
            if [ -d "$tool_dir" ]; then
              export PATH="$(pwd)/$tool_dir:$PATH"
            fi
          done
          
          # Clean environment
          make clean
          
          # Build ROM with flags to handle legacy compiler issues
          make -j$(nproc) CFLAGS="-w -ffreestanding"
        env:
          CC: arm-none-eabi-gcc
          AS: arm-none-eabi-as
          LD: arm-none-eabi-ld
          
      - uses: actions/upload-artifact@v4
        with:
          name: rom-files
          path: |
            *.gba
            *.map
            *.elf
