name: Build GBA ROM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Force the build system to use the ARM cross-compiler
      CC: arm-none-eabi-gcc
      LD: arm-none-eabi-ld
      AS: arm-none-eabi-as
      OBJCOPY: arm-none-eabi-objcopy
      CXX: arm-none-eabi-g++
      AR: arm-none-eabi-ar
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-arm-none-eabi binutils-arm-none-eabi libpng-dev pkg-config libz-dev

      - name: Build Tools
        run: |
          # Build tools individually
          for dir in tools/*/; do
            if [ -f "${dir}Makefile" ]; then
              make -C "$dir"
            fi
          done

      - name: Build ROM
        run: |
          # Ensure tools are in the path
          export PATH=$PATH:$(pwd)/tools
          
          # Run make with forced toolchain variables
          make clean
          make -j$(nproc)

      - name: Upload ROM artifact
        uses: actions/upload-artifact@v4
        with:
          name: rom-artifact
          path: "*.gba"
