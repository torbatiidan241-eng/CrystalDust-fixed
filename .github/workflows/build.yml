name: Build ROM

on:
  push:
    branches:
      - progress
      - main
  pull_request:
    branches:
      - progress
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # Required for tool compilation (gbagfx, etc.) and assembly
          sudo apt-get install -y build-essential libpng-dev gcc-arm-none-eabi binutils-arm-none-eabi

      - name: Build Tools
        run: |
          # 1. Check if there is a Makefile in tools
          if [ -f tools/Makefile ]; then
            make -C tools
          # 2. If no Makefile, check for common individual build files
          else
            echo "No Makefile found in tools/, attempting to build individual tools..."
            # Compile standard decomp tools manually if necessary
            cd tools/gbagfx && make && cd ../..
            cd tools/scaninc && make && cd ../..
            cd tools/ramscrgen && make && cd ../..
          fi
      - name: Build ROM
        run: |
          # Add the local tools directory to the PATH
          export PATH="$(pwd)/tools:$PATH"
          
          # Clean environment
          make clean
          
          # Build the ROM
          # CFLAGS="-w" is crucial to bypass legacy compiler warning-errors
          make -j$(nproc) CFLAGS="-w -ffreestanding"
          
      - name: Upload ROM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rom-files-progress-branch
          path: |
            *.gba
            *.map
            *.elf
