name: Build ROM

on:
  push:
    branches: [progress, main]
  pull_request:
    branches: [progress, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpng-dev gcc-arm-none-eabi binutils-arm-none-eabi

      - name: Build Tools
        run: |
          # Only build tools if the binaries don't exist
          make -C tools || make -C tools

      - name: Build ROM
        run: |
          export PATH="$(pwd)/tools:$PATH"
          # Use ARCH variable to help agbcc identify the platform
          # Override CFLAGS to bypass the warning-as-error issue
          make -j$(nproc) CFLAGS="-w -ffreestanding"
        env:
          # This helps some Makefiles locate the compiler if it's not in the standard PATH
          CC: arm-none-eabi-gcc
          AS: arm-none-eabi-as
          LD: arm-none-eabi-ld
          
      - uses: actions/upload-artifact@v4
        with:
          name: rom-files
          path: |
            *.gba
            *.map
            *.elf
