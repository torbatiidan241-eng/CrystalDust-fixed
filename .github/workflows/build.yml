name: Build GBA ROM

on:
  push:
    branches:
      - main
      - progrees
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-arm-none-eabi binutils-arm-none-eabi libpng-dev pkg-config libz-dev

      - name: Build agbcc
        run: |
          chmod -R +x tools/agbcc
          cd tools/agbcc
          # Manually invoke the make commands required to build the agbcc binary
          make -C gcc
          # After building, ensure the binary is copied to the main tools/agbcc folder
          cp gcc/agbcc .
          cd ../..
      - name: Prepare Toolchain
        run: |
          # Create the bin folder the Makefile expects
          mkdir -p tools/agbcc/bin
          # Link the newly built agbcc to the location the Makefile expects
          # We search for the executable anywhere in tools/agbcc
          FILE=$(find tools/agbcc -name "agbcc" -type f -perm /111 | head -n 1)
          ln -sf "$(pwd)/$FILE" "$(pwd)/tools/agbcc/bin/agbcc"

      - name: Build ROM
        run: |
          export PATH="$(pwd)/tools:$PATH"
          # Get the path to the compiler's own headers
          GCC_INCLUDE_DIR=$(arm-none-eabi-gcc -print-file-name=include)
          
          make clean
          make -j$(nproc) CC=arm-none-eabi-gcc \
                        CXX=arm-none-eabi-g++ \
                        AS=arm-none-eabi-as \
                        LD=arm-none-eabi-ld \
                        OBJCOPY=arm-none-eabi-objcopy \
                        CPPFLAGS="-Iinclude -I$GCC_INCLUDE_DIR" \
                        CFLAGS="-w -ffreestanding"
      - name: Upload ROM artifact
        uses: actions/upload-artifact@v4
        with:
          name: rom-artifact
          path: "*.gba"
