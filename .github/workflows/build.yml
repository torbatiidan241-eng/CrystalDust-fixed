name: Build GBA ROM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          # Ensure essential build tools and cross-compiler are installed
          sudo apt-get install -y build-essential gcc-arm-none-eabi binutils-arm-none-eabi libpng-dev pkg-config libz-dev

      - name: Build Tools
        run: |
          # Build tools individually
          for dir in tools/*/; do
            if [ -f "${dir}Makefile" ]; then
              make -C "$dir"
            fi
          done

      - name: Build ROM
        run: |
          # Verify baserom exists
          if [ ! -f "baserom.gba" ]; then
            echo "ERROR: baserom.gba not found in root!"
            exit 1
          fi
          
          # Add tools to PATH
          export PATH=$PATH:$(pwd)/tools
          
          # Run make by forcing the use of the ARM cross-compiler
          # These variable overrides ensure the Makefile uses the right tools
          make clean
          make -j$(nproc) CC=arm-none-eabi-gcc LD=arm-none-eabi-ld AS=arm-none-eabi-as OBJCOPY=arm-none-eabi-objcopy
      - name: Upload ROM artifact
        uses: actions/upload-artifact@v4
        with:
          name: rom-artifact
          path: "*.gba"
